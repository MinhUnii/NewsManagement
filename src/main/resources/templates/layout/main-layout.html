<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="dynamic_layout(content)">
<head th:replace="~{fragments/head :: html_head}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: html_header}"></div>

<main class="container my-4 flex-grow-1">
    <div th:replace="${content}"></div>
</main>

<footer th:replace="~{fragments/footer :: html_footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
