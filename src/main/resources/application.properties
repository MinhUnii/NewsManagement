spring.application.name=NewsManagement
# ===============================================================
# Cấu hình kết nối MS SQL Server
# ===============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=NewsDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=1
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================================================
# Cấu hình JPA / Hibernate
# ===============================================================
# Tự động tạo hoặc cập nhật cấu trúc bảng dựa trên class Entity trong Java
spring.jpa.hibernate.ddl-auto=update

# Hiển thị các câu lệnh SQL mà Hibernate thực thi xuống console để tiện theo dõi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Định nghĩa ngôn ngữ (Dialect) chuẩn cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect